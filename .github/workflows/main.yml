name: API Validation Build
on:
  pull_request_target:
    branches:
      - base
    types: 
      - opened
      - synchronize
  workflow_dispatch:
jobs:
  build:
    name: API Validation Build
    runs-on: ubuntu-latest
    steps:
      - name: install WSO2 tools
        run: |
          mkdir -p tools
          wget https://github.com/wso2/product-apim-tooling/releases/download/v4.5.0/apictl-4.5.0-linux-amd64.tar.gz
          tar -xzvf apictl-4.5.0-linux-amd64.tar.gz
          mv apictl tools/
      - name: Download governance rules
        run: |
         mkdir -p rules
         wget https://raw.githubusercontent.com/gogo-transit/train-api/rules/rules.yaml
         mv rules.yaml rules/
      - name: Checkout API Code
        uses: actions/checkout@v3
        with:
          fetch-depth: "0"
          path: base
      - name: Set release username and email
        shell: sh
        run: |
          git config --global user.name ${{ secrets.BOT_USER }}
          git config --global user.email ${{ secrets.BOT_EMAIL }}
      - name: checkout pull request and merge.
        shell: sh
        if: github.event_name == 'pull_request_target'
        run: |
          cd base
          gh pr checkout ${{ github.event.number }} -b pr-${{ github.event.number }}
          git checkout pr-${{ github.event.number }}
          git merge origin/base
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Governance Validation
        run: |
          tools/apictl/apictl import api -f "base/TrainStationApi/1.0.0/TrainStationApi-1.0.0" -e dev 
          --dry-run --insecure > result.txt || true

      - name: Fail on Governance ERRORs only
        run: |
          if grep -qE '\|.*\|\s*ERROR\s*\|' result.txt; then
            echo "::error ::Governance errors found. PR cannot be merged."
            exit 1
          else
            echo "No ERROR-level governance issues. Proceeding..."
          fi

      - name: Post Governance Report as PR Comment
        shell: sh
        if: github.event_name == 'pull_request_target' && always()
        run: |
          cd base
          gh pr comment ${{ github.event.number }} --body "$(cat ../result.txt)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
